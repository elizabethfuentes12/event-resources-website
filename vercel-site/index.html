<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" id="meta-description" content="">
    <title id="page-title">Event Resources</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <h1 id="event-name"></h1>
            <div class="hero-meta">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg>
                <span id="event-date"></span>
                <span class="separator">|</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" /></svg>
                <span id="event-location"></span>
            </div>
            <p class="hero-description" id="event-description"></p>
            <div class="hero-tags" id="event-tags"></div>
        </div>
    </section>

    <main class="main">
        <section class="speakers-section">
            <div class="section-header">
                <h2>Speakers</h2>
                <div class="line"></div>
            </div>
            <div id="speakers-container" class="speakers-grid"></div>
        </section>

        <section class="resources-section">
            <div class="section-header">
                <h2>Resources</h2>
                <div class="line"></div>
            </div>
            <div id="resources-container" class="resources-grid"></div>
        </section>
    </main>

    <footer class="footer">
        <p>Event Resources</p>
    </footer>

    <script>
        const ICONS = {
            link: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" /></svg>',
            github: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>',
            article: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" /></svg>',
            pdf: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" /></svg>',
            survey: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15a2.25 2.25 0 012.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" /></svg>',
            arrow: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg>'
        };

        fetch('event_config.json')
            .then(r => r.json())
            .then(config => {
                const { event, speakers, resources } = config;

                // Meta
                document.getElementById('meta-description').setAttribute('content',
                    `${event.name} - ${event.date} | ${event.location}. ${event.description}`);
                document.getElementById('page-title').textContent = event.name;

                // Hero
                document.getElementById('event-name').textContent = event.name;
                document.getElementById('event-date').textContent = event.date;
                document.getElementById('event-location').textContent = event.location;
                document.getElementById('event-description').textContent = event.description;

                // Tags
                const tagsContainer = document.getElementById('event-tags');
                if (event.tags) {
                    event.tags.forEach(tag => {
                        const span = document.createElement('span');
                        span.className = 'tag';
                        span.textContent = tag;
                        tagsContainer.appendChild(span);
                    });
                }

                // Speakers
                const speakersContainer = document.getElementById('speakers-container');
                speakers.forEach((speaker, i) => {
                    const card = document.createElement('div');
                    card.className = 'speaker-card animate-in';
                    card.style.animationDelay = `${i * 0.1}s`;

                    const socialHTML = speaker.social_links.map(link =>
                        `<a href="${link.url}" target="_blank" rel="noopener noreferrer" title="${link.name}">
                            <img src="${link.icon}" alt="${link.name}" loading="lazy">
                        </a>`
                    ).join('');

                    card.innerHTML = `
                        <img src="${speaker.image}" alt="${speaker.name}" class="speaker-image" loading="lazy">
                        <div class="speaker-info">
                            <h3>${speaker.name}</h3>
                            <p class="speaker-title">${speaker.title}</p>
                            <div class="social-links">${socialHTML}</div>
                        </div>
                    `;
                    speakersContainer.appendChild(card);
                });

                // Resources
                const resourcesContainer = document.getElementById('resources-container');
                resources.forEach((resource, i) => {
                    const type = resource.type || 'link';
                    const isSurvey = type === 'survey';

                    const card = document.createElement('a');
                    card.href = resource.url;
                    if (type === 'pdf') {
                        card.setAttribute('download', '');
                    }
                    card.target = resource.url.startsWith('http') ? '_blank' : '_self';
                    card.rel = 'noopener noreferrer';
                    card.className = `resource-card${isSurvey ? ' survey' : ''} animate-in`;
                    card.style.animationDelay = `${(speakers.length * 0.1) + (i * 0.08)}s`;

                    card.innerHTML = `
                        ${isSurvey ? '<span class="survey-badge">Feedback</span>' : ''}
                        <div class="resource-icon ${type}">${ICONS[type] || ICONS.link}</div>
                        <div class="resource-content">
                            <h3>${resource.title}</h3>
                            <p>${resource.description}</p>
                        </div>
                        <div class="resource-arrow">${ICONS.arrow}</div>
                    `;
                    resourcesContainer.appendChild(card);
                });
            });
    </script>
</body>
</html>
